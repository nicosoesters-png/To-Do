<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To-Do List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital@0;1&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0e1a2b;
    --navy-deep: #0a141f;
    --cream: #ece8e0;
    --cream-dim: #e1ddd3;
    --gold: #b89a5e;
    --ink: #1c2430;
    --line: #b9b2a3;
    --muted: #8a8275;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
  }
  body {
    font-family: "Jost", sans-serif;
    background: radial-gradient(circle at 20% 0%, #15233a 0%, var(--navy) 45%, var(--navy-deep) 100%);
    margin: 0;
    padding: 48px 32px;
    color: var(--cream);
    min-height: 100vh;
  }
  .top {
    text-align: center;
    margin-bottom: 40px;
  }
  .top .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .top h1 {
    font-family: "Playfair Display", serif;
    font-weight: 600;
    font-size: 2.6rem;
    margin: 0;
    letter-spacing: 0.02em;
    color: #f4f1ea;
  }
  .top .rule {
    width: 70px;
    height: 1px;
    background: var(--gold);
    margin: 16px auto 0;
  }

  .layout {
    max-width: 1180px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 460px;
    gap: 28px;
    align-items: start;
  }
  @media (max-width: 980px) {
    .layout { grid-template-columns: 1fr; }
  }
  .boxes-top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .boxes-stack {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 20px;
  }

  .card {
    background: var(--cream);
    border-radius: 18px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    color: var(--ink);
    padding: 22px 24px 16px;
  }
  .card-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .card-head h2 {
    font-family: "Playfair Display", serif;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 0;
  }
  .card-head .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
  }
  .box.today .dot { background: #8a2c2c; }
  .box.tomorrow .dot { background: #b56a2c; }
  .box.week .dot { background: var(--gold); }
  .box.nextweek .dot { background: #3a5a78; }
  .box.general .dot { background: #8a8275; }

  .box-list {
    list-style: none;
    margin: 0;
    padding: 0;
    min-height: 30px;
  }
  .box-list li {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--line);
  }
  .box-list li:last-child { border-bottom: none; }
  .box-list .chk {
    width: 13px;
    height: 13px;
    border: 1px solid var(--ink);
    flex: 0 0 13px;
    margin-top: 2px;
  }
  .box-list .label {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 1.05rem;
    flex: 1;
  }
  .box-list .meta {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .box-list .empty {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    color: var(--muted);
    padding: 6px 0;
  }

  .panel {
    background: var(--cream);
    border-radius: 18px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    padding: 26px 26px 20px;
    color: var(--ink);
  }
  .panel h2 {
    font-family: "Playfair Display", serif;
    font-weight: 600;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    margin: 0 0 22px 0;
  }
  form.add-task {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr auto;
    gap: 8px;
    margin-bottom: 22px;
  }
  form.add-task input, form.add-task select {
    padding: 9px 10px;
    border: none;
    border-bottom: 1px solid var(--line);
    background: transparent;
    font-family: "Jost", sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
  }
  form.add-task input:focus, form.add-task select:focus {
    outline: none;
    border-bottom-color: var(--gold);
  }
  form.add-task button {
    background: var(--navy);
    color: var(--cream);
    border: none;
    border-radius: 4px;
    padding: 8px 16px;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }
  form.add-task button:hover { background: #16294a; }

  .task-rows {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .task-rows li {
    display: grid;
    grid-template-columns: 22px 1fr 95px 120px 24px;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
  }
  .task-rows li.done {
    opacity: 0.45;
  }
  .task-rows li.done .task-input {
    text-decoration: line-through;
  }
  .task-rows input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: var(--navy);
    cursor: pointer;
  }
  .task-rows .task-input {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 1.05rem;
    border: none;
    background: transparent;
    color: var(--ink);
    width: 100%;
    padding: 2px 0;
  }
  .task-rows .task-input:focus { outline: none; border-bottom: 1px solid var(--gold); }
  .task-rows select, .task-rows input[type="date"] {
    border: none;
    background: transparent;
    font-family: "Jost", sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    padding: 2px 0;
    width: 100%;
  }
  .task-rows select:focus, .task-rows input[type="date"]:focus { outline: none; }
  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    justify-self: end;
  }
  .del-btn:hover { color: #8a2c2c; }

  .notify-btn {
    position: fixed;
    top: 24px;
    right: 28px;
    background: var(--cream);
    color: var(--ink);
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    font-family: "Jost", sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
  .notify-btn.on {
    background: var(--gold);
    color: #2a2210;
  }
  .notify-btn:hover { opacity: 0.9; }

  .verse-widget {
    position: fixed;
    bottom: 22px;
    right: 22px;
    max-width: 260px;
    background: rgba(236, 232, 224, 0.94);
    color: var(--ink);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    border-left: 3px solid var(--gold);
  }
  .verse-widget .verse-label {
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .verse-widget .verse-text {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 0.92rem;
    line-height: 1.35;
    margin-bottom: 6px;
  }
  .verse-widget .verse-ref {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
  }
  @media (max-width: 600px) {
    .verse-widget { max-width: 200px; font-size: 0.85rem; }
    .notify-btn { top: 16px; right: 16px; }
  }
</style>
</head>
<body>
  <button class="notify-btn" id="notify-btn">🔔 Enable Notifications</button>

  <div class="top">
    <div class="eyebrow">Daily Discipline</div>
    <h1>To Do List</h1>
    <div class="rule"></div>
  </div>

  <div class="layout">
    <div>
      <div class="boxes-top">
        <div class="card box today">
          <div class="card-head"><h2>Today</h2><span class="dot"></span></div>
          <ul class="box-list" id="box-Today"></ul>
        </div>
        <div class="card box tomorrow">
          <div class="card-head"><h2>Tomorrow</h2><span class="dot"></span></div>
          <ul class="box-list" id="box-Tomorrow"></ul>
        </div>
      </div>
      <div class="boxes-stack">
        <div class="card box week">
          <div class="card-head"><h2>This Week</h2><span class="dot"></span></div>
          <ul class="box-list" id="box-ThisWeek"></ul>
        </div>
        <div class="card box nextweek">
          <div class="card-head"><h2>Next Week</h2><span class="dot"></span></div>
          <ul class="box-list" id="box-NextWeek"></ul>
        </div>
        <div class="card box general">
          <div class="card-head"><h2>General</h2><span class="dot"></span></div>
          <ul class="box-list" id="box-General"></ul>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Tasks</h2>
      <form class="add-task" id="add-form">
        <input type="text" id="new-task" placeholder="Task name" required />
        <select id="new-priority">
          <option>Medium</option>
          <option>High</option>
          <option>Low</option>
        </select>
        <input type="date" id="new-due" />
        <button type="submit">Add</button>
      </form>
      <ul class="task-rows" id="task-rows"></ul>
    </div>
  </div>

  <div class="verse-widget">
    <div class="verse-label">Verse of the Day</div>
    <div class="verse-text" id="verse-text"></div>
    <div class="verse-ref" id="verse-ref"></div>
  </div>

<script>
const STORAGE_KEY = "todo-app-tasks";

function loadTasks() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) return JSON.parse(raw);
  const today = new Date();
  const iso = (d) => d.toISOString().slice(0, 10);
  const addDays = (n) => { const d = new Date(today); d.setDate(d.getDate() + n); return iso(d); };
  return [
    { id: cryptoId(), task: "Finish proposal", priority: "High", due: iso(today), done: false },
    { id: cryptoId(), task: "Pay invoice", priority: "Medium", due: addDays(-2), done: false },
    { id: cryptoId(), task: "Call client", priority: "Medium", due: addDays(1), done: false },
    { id: cryptoId(), task: "Team meeting prep", priority: "Low", due: addDays(3), done: false },
    { id: cryptoId(), task: "Submit report", priority: "High", due: addDays(10), done: false },
    { id: cryptoId(), task: "Clean inbox", priority: "Low", due: "", done: false },
  ];
}

function cryptoId() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function saveTasks(tasks) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

let tasks = loadTasks();

function startOfDay(d) {
  const x = new Date(d);
  x.setHours(0, 0, 0, 0);
  return x;
}

function endOfWeek(d) {
  const x = startOfDay(d);
  const day = x.getDay();
  const diff = day === 0 ? 0 : 7 - day;
  x.setDate(x.getDate() + diff);
  return x;
}

function computeArea(t) {
  if (t.done) return "Done";
  if (!t.due) return "General";
  const today = startOfDay(new Date());
  const due = startOfDay(new Date(t.due + "T00:00:00"));
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const weekEnd = endOfWeek(today);
  if (due <= today) return "Today";
  if (due.getTime() === tomorrow.getTime()) return "Tomorrow";
  if (due <= weekEnd) return "ThisWeek";
  return "NextWeek";
}

function fmtDate(due) {
  if (!due) return "";
  const d = new Date(due + "T00:00:00");
  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  return `${dd}.${mm}.`;
}

const AREA_LABEL = { Today: "Today", Tomorrow: "Tomorrow", ThisWeek: "This Week", NextWeek: "Next Week", General: "General", Done: "Done" };

function render() {
  const boxIds = ["Today", "Tomorrow", "ThisWeek", "NextWeek", "General"];
  const grouped = {};
  boxIds.forEach((b) => (grouped[b] = []));
  tasks.forEach((t) => {
    const area = computeArea(t);
    if (grouped[area]) grouped[area].push(t);
  });

  boxIds.forEach((b) => {
    const ul = document.getElementById("box-" + b);
    ul.innerHTML = "";
    if (grouped[b].length === 0) {
      const li = document.createElement("li");
      li.className = "empty";
      li.textContent = "— none —";
      ul.appendChild(li);
      return;
    }
    grouped[b].forEach((t) => {
      const li = document.createElement("li");
      const chk = document.createElement("span");
      chk.className = "chk";
      const label = document.createElement("span");
      label.className = "label";
      label.textContent = t.task;
      const meta = document.createElement("span");
      meta.className = "meta";
      meta.textContent = (t.due ? fmtDate(t.due) + " · " : "") + t.priority;
      li.appendChild(chk);
      li.appendChild(label);
      li.appendChild(meta);
      ul.appendChild(li);
    });
  });

  const list = document.getElementById("task-rows");
  list.innerHTML = "";
  tasks.forEach((t) => {
    const li = document.createElement("li");
    if (t.done) li.className = "done";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = t.done;
    cb.addEventListener("change", () => {
      t.done = cb.checked;
      saveTasks(tasks);
      render();
    });

    const taskInput = document.createElement("input");
    taskInput.type = "text";
    taskInput.className = "task-input";
    taskInput.value = t.task;
    taskInput.addEventListener("change", () => {
      t.task = taskInput.value;
      saveTasks(tasks);
      render();
    });

    const sel = document.createElement("select");
    ["High", "Medium", "Low"].forEach((p) => {
      const opt = document.createElement("option");
      opt.value = p;
      opt.textContent = p;
      if (t.priority === p) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener("change", () => {
      t.priority = sel.value;
      saveTasks(tasks);
      render();
    });

    const dueInput = document.createElement("input");
    dueInput.type = "date";
    dueInput.value = t.due || "";
    dueInput.addEventListener("change", () => {
      t.due = dueInput.value;
      saveTasks(tasks);
      render();
    });

    const delBtn = document.createElement("button");
    delBtn.className = "del-btn";
    delBtn.textContent = "✕";
    delBtn.title = "Delete task";
    delBtn.addEventListener("click", () => {
      tasks = tasks.filter((x) => x.id !== t.id);
      saveTasks(tasks);
      render();
    });

    li.appendChild(cb);
    li.appendChild(taskInput);
    li.appendChild(sel);
    li.appendChild(dueInput);
    li.appendChild(delBtn);
    list.appendChild(li);
  });
}

document.getElementById("add-form").addEventListener("submit", (e) => {
  e.preventDefault();
  const taskInput = document.getElementById("new-task");
  const priorityInput = document.getElementById("new-priority");
  const dueInput = document.getElementById("new-due");
  if (!taskInput.value.trim()) return;
  tasks.push({
    id: cryptoId(),
    task: taskInput.value.trim(),
    priority: priorityInput.value,
    due: dueInput.value,
    done: false,
  });
  saveTasks(tasks);
  taskInput.value = "";
  dueInput.value = "";
  priorityInput.value = "Medium";
  render();
});

render();

// ---------- Verse of the Day ----------
const VERSES = [
  { text: "I can do all things through Christ who strengthens me.", ref: "Philippians 4:13" },
  { text: "Be strong and courageous. Do not be afraid; the Lord your God goes with you.", ref: "Deuteronomy 31:6" },
  { text: "For I know the plans I have for you, plans to prosper you and not to harm you.", ref: "Jeremiah 29:11" },
  { text: "Love is patient, love is kind. It does not envy, it does not boast.", ref: "1 Corinthians 13:4" },
  { text: "Trust in the Lord with all your heart and lean not on your own understanding.", ref: "Proverbs 3:5" },
  { text: "The Lord is my shepherd, I lack nothing.", ref: "Psalm 23:1" },
  { text: "Cast all your anxiety on Him because He cares for you.", ref: "1 Peter 5:7" },
  { text: "She is clothed with strength and dignity, and she laughs without fear of the future.", ref: "Proverbs 31:25" },
  { text: "This is the day the Lord has made; let us rejoice and be glad in it.", ref: "Psalm 118:24" },
  { text: "Let all that you do be done in love.", ref: "1 Corinthians 16:14" },
  { text: "Do not be anxious about anything, but in everything by prayer let your requests be known to God.", ref: "Philippians 4:6" },
  { text: "The Lord himself goes before you and will be with you; he will never leave you.", ref: "Deuteronomy 31:8" },
  { text: "Delight yourself in the Lord, and he will give you the desires of your heart.", ref: "Psalm 37:4" },
  { text: "Above all else, guard your heart, for everything you do flows from it.", ref: "Proverbs 4:23" },
  { text: "Come to me, all who are weary, and I will give you rest.", ref: "Matthew 11:28" },
  { text: "Be still, and know that I am God.", ref: "Psalm 46:10" },
  { text: "And we know that in all things God works for the good of those who love him.", ref: "Romans 8:28" },
  { text: "Give thanks in all circumstances; for this is God's will for you.", ref: "1 Thessalonians 5:18" },
  { text: "Whoever dwells in the shelter of the Most High will rest in the shadow of the Almighty.", ref: "Psalm 91:1" },
  { text: "But those who hope in the Lord will renew their strength. They will soar on wings like eagles.", ref: "Isaiah 40:31" },
  { text: "Rejoice always, pray continually, give thanks in all circumstances.", ref: "1 Thessalonians 5:16-18" },
  { text: "A new command I give you: Love one another. As I have loved you, so you must love one another.", ref: "John 13:34" },
  { text: "The joy of the Lord is your strength.", ref: "Nehemiah 8:10" },
  { text: "He heals the brokenhearted and binds up their wounds.", ref: "Psalm 147:3" },
  { text: "Many are the plans in a person's heart, but it is the Lord's purpose that prevails.", ref: "Proverbs 19:21" },
  { text: "Keep your eyes on Jesus, the author and perfecter of faith.", ref: "Hebrews 12:2" },
  { text: "Don't let your heart be troubled. Trust in God, trust also in me.", ref: "John 14:1" },
  { text: "Every good and perfect gift is from above, coming down from the Father of lights.", ref: "James 1:17" },
  { text: "May the God of hope fill you with all joy and peace as you trust in him.", ref: "Romans 15:13" },
  { text: "But seek first his kingdom and his righteousness, and all these things will be given to you as well.", ref: "Matthew 6:33" },
  { text: "The Lord is close to the brokenhearted and saves those who are crushed in spirit.", ref: "Psalm 34:18" },
];

function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  return Math.floor(diff / 86400000);
}

function renderVerse() {
  const idx = dayOfYear(new Date()) % VERSES.length;
  const v = VERSES[idx];
  document.getElementById("verse-text").textContent = `"${v.text}"`;
  document.getElementById("verse-ref").textContent = v.ref;
}
renderVerse();
// re-check at the top of the next hour in case the tab stays open past midnight
setInterval(renderVerse, 60 * 60 * 1000);

// ---------- Notifications ----------
const NOTIFY_KEY = "todo-app-notify-enabled";
const NOTIFIED_DATE_KEY = "todo-app-last-notified";
const notifyBtn = document.getElementById("notify-btn");

function notifyEnabled() {
  return localStorage.getItem(NOTIFY_KEY) === "true" && Notification.permission === "granted";
}

function updateNotifyBtn() {
  if (!("Notification" in window)) {
    notifyBtn.style.display = "none";
    return;
  }
  if (notifyEnabled()) {
    notifyBtn.textContent = "🔔 Notifications On";
    notifyBtn.classList.add("on");
  } else {
    notifyBtn.textContent = "🔔 Enable Notifications";
    notifyBtn.classList.remove("on");
  }
}

function checkDueTodayAndNotify(force) {
  if (!notifyEnabled()) return;
  const todayStr = new Date().toDateString();
  if (!force && localStorage.getItem(NOTIFIED_DATE_KEY) === todayStr) return;

  const dueToday = tasks.filter((t) => !t.done && computeArea(t) === "Today");
  if (dueToday.length === 0) return;

  const names = dueToday.map((t) => t.task).join(", ");
  new Notification("Today's tasks", {
    body: dueToday.length === 1 ? names : `${dueToday.length} tasks due: ${names}`,
    icon: undefined,
  });
  localStorage.setItem(NOTIFIED_DATE_KEY, todayStr);
}

notifyBtn.addEventListener("click", () => {
  if (!("Notification" in window)) return;
  if (Notification.permission === "granted") {
    const enabled = localStorage.getItem(NOTIFY_KEY) === "true";
    localStorage.setItem(NOTIFY_KEY, (!enabled).toString());
    updateNotifyBtn();
    if (!enabled) checkDueTodayAndNotify(true);
    return;
  }
  Notification.requestPermission().then((perm) => {
    if (perm === "granted") {
      localStorage.setItem(NOTIFY_KEY, "true");
      checkDueTodayAndNotify(true);
    }
    updateNotifyBtn();
  });
});

updateNotifyBtn();
checkDueTodayAndNotify(false);
// while the tab stays open, re-check periodically in case the date rolls over
setInterval(() => checkDueTodayAndNotify(false), 30 * 60 * 1000);
</script>
</body>
</html>
